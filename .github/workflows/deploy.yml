on:
  push:
    tags:
      - "**"

jobs:
  build:
    name: Deploy Containers
    runs-on: ${{ matrix.architecture }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        target:
          - distro: ubuntu
            version: "25.04"
          - distro: ubuntu
            version: "25.10"
          - distro: ubuntu
            version: "26.04"
          - distro: fedora
            version: "40"
          - distro: fedora
            version: "41"
          - distro: fedora
            version: "42"
          - distro: fedora
            version: "43"
          - distro: fedora
            version: "44"
        architecture: [ubuntu-26.04, ubuntu-26.04-arm]
    steps:
      - uses: docker/setup-buildx-action@v4.1.0
      - uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: docker_meta
        uses: docker/metadata-action@v6.1.0
        with:
          images: ghcr.io/${{ github.repository }}-${{ matrix.target.distro }}-${{ matrix.target.version }}

      - uses: docker/build-push-action@v7.2.0
        with:
          file: ${{ matrix.target.distro }}.Dockerfile
          build-args: version=${{ matrix.target.version }}
          tags: ${{ steps.docker_meta.outputs.tags }}
          push: true
